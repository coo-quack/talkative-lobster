name: Sync main to develop

on:
  push:
    branches: [main]

permissions: {}

concurrency:
  group: sync-main-to-develop
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Check if sync is needed
        id: check
        run: |
          git fetch origin develop
          if git merge-base --is-ancestor origin/main origin/develop; then
            echo "needed=false" >> $GITHUB_OUTPUT
          else
            echo "needed=true" >> $GITHUB_OUTPUT
          fi

      - name: Prepare sync branch
        if: steps.check.outputs.needed == 'true'
        id: branch
        run: |
          BRANCH="chore/sync-main-to-develop-${{ github.run_id }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$BRANCH" origin/develop
          git merge origin/main --no-edit
          git push origin "$BRANCH"
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

      - name: Open PR and enable auto-merge
        if: steps.check.outputs.needed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_URL=$(gh pr create \
            --base develop \
            --head "${{ steps.branch.outputs.branch }}" \
            --title "chore: sync main to develop" \
            --body "Automated sync of main into develop. Auto-merges once CI passes.")
          gh pr merge --auto --merge "$PR_URL"
