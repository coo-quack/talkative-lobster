name: Sync main to develop

on:
  push:
    branches: [main]

permissions: {}

concurrency:
  group: sync-main-to-develop
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Check if sync is needed
        id: check
        run: |
          git fetch origin develop
          if git merge-base --is-ancestor origin/main origin/develop; then
            echo "needed=false" >> $GITHUB_OUTPUT
          else
            echo "needed=true" >> $GITHUB_OUTPUT
          fi

      - name: Mint app token
        if: steps.check.outputs.needed == 'true'
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.BACKPORT_APP_ID }}
          private-key: ${{ secrets.BACKPORT_APP_PRIVATE_KEY }}

      - name: Prepare sync branch
        if: steps.check.outputs.needed == 'true'
        id: branch
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          BRANCH="chore/sync-main-to-develop-${{ github.run_id }}"
          SLUG="${{ steps.app-token.outputs.app-slug }}"
          git config user.name "${SLUG}[bot]"
          git config user.email "${SLUG}[bot]@users.noreply.github.com"
          # Push via app token so subsequent workflows (CI) fire on the new branch.
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git checkout -B "$BRANCH" origin/develop
          git merge origin/main --no-edit
          git push origin "$BRANCH"
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

      - name: Open PR and enable auto-merge
        if: steps.check.outputs.needed == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          PR_URL=$(gh pr create \
            --base develop \
            --head "${{ steps.branch.outputs.branch }}" \
            --title "chore: sync main to develop" \
            --body "Automated sync of main into develop. Auto-merges once CI passes.")
          gh pr merge --auto --merge "$PR_URL"
