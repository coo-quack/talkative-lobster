name: CI

on:
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  typecheck:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck

  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint

  format:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run format:check

  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run test

  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - uses: actions/upload-artifact@v7
        with:
          name: build-output
          path: out/
          retention-days: 1

  e2e:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: build
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: pnpm install --frozen-lockfile
      - name: debug electron install
        shell: bash
        run: |
          set +e
          echo "=== env ==="
          env | grep -iE "electron|cache|npm|pnpm" || true
          echo "=== electron module dir ==="
          ls -la node_modules/.pnpm/electron@*/node_modules/electron/ 2>&1
          echo "=== electron dist (before) ==="
          ls -la node_modules/.pnpm/electron@*/node_modules/electron/dist/ 2>&1
          echo "=== path.txt (before) ==="
          cat node_modules/.pnpm/electron@*/node_modules/electron/path.txt 2>&1
          echo "=== ~/.cache/electron ==="
          ls -la ~/.cache/electron/ 2>&1
          echo "=== run install.js with verbose ==="
          ELECTRON_GET_USE_PROXY=0 DEBUG=electron* node node_modules/.pnpm/electron@*/node_modules/electron/install.js 2>&1
          echo "exit=$?"
          echo "=== electron dist (after install.js) ==="
          ls -la node_modules/.pnpm/electron@*/node_modules/electron/dist/ 2>&1
          echo "=== path.txt (after) ==="
          cat node_modules/.pnpm/electron@*/node_modules/electron/path.txt 2>&1
          echo "=== try require ==="
          node -p "require('electron')" 2>&1
          true
      - run: npx playwright install-deps
      - uses: actions/download-artifact@v8
        with:
          name: build-output
          path: out/
      - run: xvfb-run --auto-servernum pnpm run test:e2e
        env:
          CI: true
