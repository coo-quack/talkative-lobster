name: CI

on:
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  typecheck:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck

  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint

  format:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run format:check

  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run test

  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - uses: actions/upload-artifact@v7
        with:
          name: build-output
          path: out/
          retention-days: 1

  e2e:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: build
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: pnpm install --frozen-lockfile
      - name: ensure electron binary is extracted
        shell: bash
        run: |
          set -e
          ELECTRON_DIR=$(ls -d node_modules/.pnpm/electron@*/node_modules/electron | head -1)
          # install.js (postinstall) downloads the zip but extract-zip fails silently
          # on pnpm's symlinked layout — extract it ourselves.
          (cd "$ELECTRON_DIR" && node install.js) || true
          ZIP=$(find ~/.cache/electron -name "electron-v*-linux-x64.zip" | head -1)
          if [ -z "$ZIP" ]; then
            echo "ERROR: electron zip not found in cache"
            exit 1
          fi
          rm -rf "$ELECTRON_DIR/dist"
          mkdir -p "$ELECTRON_DIR/dist"
          unzip -q -o "$ZIP" -d "$ELECTRON_DIR/dist"
          # path.txt must be the platform-relative path with NO trailing newline
          printf "electron" > "$ELECTRON_DIR/path.txt"
          test -x "$ELECTRON_DIR/dist/electron"
      - run: npx playwright install-deps
      - uses: actions/download-artifact@v8
        with:
          name: build-output
          path: out/
      - run: xvfb-run --auto-servernum pnpm run test:e2e
        env:
          CI: true
