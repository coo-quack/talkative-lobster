name: CI

on:
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  typecheck:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck

  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint

  format:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run format:check

  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run test

  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - uses: actions/upload-artifact@v7
        with:
          name: build-output
          path: out/
          retention-days: 1

  e2e:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: build
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: pnpm install --frozen-lockfile
      - name: force-download electron binary
        shell: bash
        run: |
          set +e
          ELECTRON_DIR=$(ls -d node_modules/.pnpm/electron@*/node_modules/electron | head -1)
          echo "=== electron dir: $ELECTRON_DIR ==="
          echo "=== install.js contents ==="
          cat "$ELECTRON_DIR/install.js"
          echo ""
          echo "=== remove stale dist + cache ==="
          rm -rf "$ELECTRON_DIR/dist" ~/.cache/electron
          mkdir -p "$ELECTRON_DIR/dist"
          echo "=== run install.js from electron dir ==="
          (cd "$ELECTRON_DIR" && DEBUG=electron*,@electron* node install.js) 2>&1
          echo "exit=$?"
          echo "=== dist after ==="
          ls -la "$ELECTRON_DIR/dist/" 2>&1
          echo "=== path.txt after ==="
          cat "$ELECTRON_DIR/path.txt" 2>&1
          true
      - run: npx playwright install-deps
      - uses: actions/download-artifact@v8
        with:
          name: build-output
          path: out/
      - run: xvfb-run --auto-servernum pnpm run test:e2e
        env:
          CI: true
